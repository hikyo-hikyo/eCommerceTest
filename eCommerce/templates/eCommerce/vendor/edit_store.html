{% extends 'eCommerce/base.html' %}

{% block title %}Edit Store{% endblock %}

{% block content %}
    <h1>Edit Store: {{ store.name }}</h1>
    
    <form method="POST">
        {% csrf_token %}
        <p>
            <label>Store Name:</label><br>
            <input type="text" name="name" value="{{ store.name }}" required>
        </p>
        <p>
            <label>Description:</label><br>
            <textarea name="description" rows="4" cols="50">{{ store.description }}</textarea>
        </p>
        <button type="submit">Save Changes</button>
        <a href="{% url 'eCommerce:vendor_dashboard' %}">Cancel</a>
    </form>
{% endblock %}
